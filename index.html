<body>
    <h1>SMCDC Photo Frame</h1>
    <div class="container">
        <canvas id="mainCanvas" width="1080" height="1080"></canvas>
        
        <div class="controls-grid">
            <button onclick="adjust('up')">⬆️</button>
            <button onclick="adjust('left')">⬅️</button>
            <button onclick="adjust('right')">➡️</button>
            <button onclick="adjust('down')">⬇️</button>
            <button onclick="adjust('plus')">Zoom +</button>
            <button onclick="adjust('minus')">Zoom -</button>
        </div>

        <div class="action-bar">
            <input type="file" id="upload" accept="image/*">
            <button id="download" class="download-btn">Download Frame</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
