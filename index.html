<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SMCDC Profile Frame</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>SMCDC Photo Frame</h1>
    <div class="container">
        <canvas id="mainCanvas" width="1080" height="1080"></canvas>
        <div class="controls">
            <input type="file" id="upload" accept="image/*">
            <button id="download">Download Frame</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
